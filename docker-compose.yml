services:
  postgres:
    image: postgres:16
    container_name: sapphire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sapphire}
      POSTGRES_USER: ${POSTGRES_USER:-sapphire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sapphire}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sapphire} -d ${POSTGRES_DB:-sapphire}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
