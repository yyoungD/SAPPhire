spring.application.name=server
spring.config.import=optional:file:../../.env[.properties]
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sapphire}
spring.datasource.username=${DB_USERNAME:sapphire}
spring.datasource.password=${DB_PASSWORD:sapphire}
spring.datasource.driver-class-name=org.postgresql.Driver

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

springdoc.swagger-ui.path=/swagger-ui.html

profile-image.upload-dir=${PROFILE_IMAGE_UPLOAD_DIR:../../profileImg}

jwt.secret=${JWT_SECRET:sapphire-local-jwt-secret-key-32bytes-minimum}
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=1209600000
