spring.application.name=server
server.port=${PORT:8080}
spring.config.import=optional:file:../../.env[.properties]
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sapphire}
spring.datasource.username=${DB_USERNAME:sapphire}
spring.datasource.password=${DB_PASSWORD:sapphire}
spring.datasource.driver-class-name=org.postgresql.Driver

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

springdoc.swagger-ui.path=/swagger-ui.html

profile-image.upload-dir=${PROFILE_IMAGE_UPLOAD_DIR:uploads/profileImg}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://sapphireclient.vercel.app}

jwt.secret=${JWT_SECRET:sapphire-local-jwt-secret-key-32bytes-minimum}
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=1209600000

odcloud.service-key=${ODCLOUD_SERVICE_KEY:}
odcloud.business-status-url=${ODCLOUD_BUSINESS_STATUS_URL:https://api.odcloud.kr/api/nts-businessman/v1/status}

openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.responses-url=${OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}
